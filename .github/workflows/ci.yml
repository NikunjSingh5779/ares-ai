name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -e ".[dev]"
        
      - name: Lint with ruff
        run: ruff check .
        
      - name: Test with pytest
        env:
          PYTHONPATH: .
        run: pytest tests/
