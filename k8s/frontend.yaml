apiVersion: v1
kind: Service
metadata:
  name: ares-ai-frontend
  labels:
    app: ares-ai
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: ares-ai
    component: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ares-ai-frontend
  labels:
    app: ares-ai
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ares-ai
      component: frontend
  template:
    metadata:
      labels:
        app: ares-ai
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ares-ai/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://ares-ai-backend:8000"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
