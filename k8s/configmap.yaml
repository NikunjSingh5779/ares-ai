apiVersion: v1
kind: ConfigMap
metadata:
  name: ares-ai-config
  labels:
    app: ares-ai
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  CHROMA_HOST: "chromadb"
  CHROMA_PORT: "8000"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ares_ai"
  EXCHANGE_TESTNET: "true"
