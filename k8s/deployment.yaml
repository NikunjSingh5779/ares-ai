apiVersion: apps/v1
kind: Deployment
metadata:
  name: ares-ai-backend
  labels:
    app: ares-ai
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: ares-ai
      component: backend
  template:
    metadata:
      labels:
        app: ares-ai
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/ares-ai/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ares-ai-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ares-ai-secrets
                  key: postgres_password
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ares-ai-secrets
                  key: api_secret_key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ares-ai-backend
  labels:
    app: ares-ai
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      name: http
  selector:
    app: ares-ai
    component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ares-ai-redis
  labels:
    app: ares-ai
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ares-ai
      component: redis
  template:
    metadata:
      labels:
        app: ares-ai
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: ares-ai
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: ares-ai
    component: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ares-ai-postgres
  labels:
    app: ares-ai
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ares-ai
      component: postgres
  template:
    metadata:
      labels:
        app: ares-ai
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "ares"
            - name: POSTGRES_DB
              value: "ares_ai"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ares-ai-secrets
                  key: postgres_password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "ares"]
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ares-ai-postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ares-ai-postgres-data
  labels:
    app: ares-ai
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: ares-ai
    component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: ares-ai
    component: postgres
