# ARES AI — nginx reverse proxy configuration
# TLS termination, rate limiting, and request routing.
# Designed to sit in front of the FastAPI backend service.

upstream backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name ares-ai.local;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ares-ai.local;

    # ── TLS ────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Rate limiting zones ────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=30r/s;
    limit_req_zone  $binary_remote_addr  zone=burst:10m rate=5r/s;
    limit_req_status 429;

    # ── Security headers ───────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── API proxy ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass  http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      90s;
    }

    # ── Health check (unauthenticated, no rate limit) ──────────────
    location /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Metrics (internal only) ────────────────────────────────────
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass http://backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Static / frontend (if served via nginx) ────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Error pages ────────────────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        internal;
        return 429 "Rate limit exceeded. Try again later.\n";
    }
}
