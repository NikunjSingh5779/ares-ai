# =============================================================================
# ARES AI — Docker Compose (Development)
# =============================================================================
# Services: PostgreSQL, Redis, ChromaDB, Backend API
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---- Database ----
  postgres:
    image: postgres:16-alpine
    container_name: ares-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ares}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-ares_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ares}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - ares-network

  # ---- Cache ----
  redis:
    image: redis:7-alpine
    container_name: ares-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks:
      - ares-network

  # ---- Vector Database ----
  chromadb:
    image: chromadb/chroma:latest
    container_name: ares-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma-data
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb_data:/chroma/chroma-data
    healthcheck:
      disable: true
    logging: *default-logging
    networks:
      - ares-network

  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ares-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ares}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-ares_ai}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - API_DEBUG=false
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: [ "CMD", "python", "-c", "import http.client; conn=http.client.HTTPConnection('localhost:8000'); conn.request('GET','/health'); resp=conn.getresponse(); exit(0) if resp.status==200 else exit(1)" ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging: *default-logging
    networks:
      - ares-network

  # ---- Frontend Dashboard ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ares-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    networks:
      - ares-network

  # ---- Reverse Proxy: nginx ----
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: ares-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    logging: *default-logging
    networks:
      - ares-network

  # ---- Scheduled Backups ----
  backup:
    image: postgres:16-alpine
    container_name: ares-backup
    restart: unless-stopped
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER:-ares}
      - PGPASSWORD=${POSTGRES_PASSWORD:-changeme_in_production}
      - PGDATABASE=${POSTGRES_DB:-ares_ai}
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=7
      - S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./docker/backup:/scripts:ro
      - backup_data:/backups
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache aws-cli >/dev/null 2>&1
        echo "0 2 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - ares-network

  # ---- Monitoring: Prometheus ----
  prometheus:
    image: prom/prometheus:latest
    container_name: ares-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    networks:
      - ares-network

  # ---- Monitoring: Grafana ----
  grafana:
    image: grafana/grafana:latest
    container_name: ares-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    logging: *default-logging
    networks:
      - ares-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chromadb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backup_data:
    driver: local

networks:
  ares-network:
    driver: bridge
