# =============================================================================
# ARES AI — Model Roster
# =============================================================================
# All model IDs live here — never hardcoded in agent source files.
# Configured exclusively with working free-tier models across OpenRouter
# and OpenCode, matching the best model size/capabilities to each agent's purpose.
# =============================================================================

defaults:
  timeout_seconds: 60
  max_retries: 3
  circuit_breaker_threshold: 3
  circuit_breaker_reset_seconds: 300
  rate_limit_rpm: 4

agents:
  supervisor:
    # Needs fast, low-latency routing decisions
    primary: open_router/google/gemini-1.5-flash
    fallbacks:
      - open_router/mistral/mistral-small-latest
      - open_router/nvidia/nemotron-3-nano-30b-a3b:free
      - opencode/deepseek-v4-flash-free # [UNVERIFIED]
    timeout_seconds: 30
    max_retries: 3

  coding:
    # Needs excellent code generation capabilities
    primary: open_router/nvidia/nemotron-3-super-120b-a12b:free
    fallbacks:
      - open_router/google/gemma-4-31b-it:free
      - opencode/north-mini-code-free # [UNVERIFIED]
    timeout_seconds: 120

  market_analyst:
    # Needs strong reasoning, chart pattern recognition, and strict JSON output
    primary: open_router/meta-llama/llama-3.3-70b-instruct:free
    fallbacks:
      - open_router/nousresearch/hermes-3-llama-3.1-405b:free
      - open_router/meta-llama/llama-3.2-3b-instruct:free
      - open_router/qwen/qwen3-coder:free
    timeout_seconds: 60

  quant:
    # Needs rigorous math logic, volatility calculations, and perfect JSON compliance
    primary: open_router/meta-llama/llama-3.3-70b-instruct:free
    fallbacks:
      - open_router/nousresearch/hermes-3-llama-3.1-405b:free
      - open_router/meta-llama/llama-3.2-3b-instruct:free
      - open_router/qwen/qwen3-coder:free
    timeout_seconds: 90

  risk:
    # Needs strict rule adherence, no hallucinations, and flawless JSON output
    primary: open_router/mistral/mistral-small-latest
    fallbacks:
      - open_router/google/gemini-1.5-flash
      - open_router/google/gemma-4-31b-it:free
    timeout_seconds: 45

  news:
    # Needs large context windows and strong text sentiment analysis
    primary: open_router/google/gemini-1.5-flash
    fallbacks:
      - open_router/mistral/mistral-small-latest
      - open_router/nvidia/nemotron-3-super-120b-a12b:free
    timeout_seconds: 45

  consensus:
    # Consensus is deterministic (no LLM), but needs a config entry
    primary: open_router/nvidia/nemotron-3-nano-30b-a3b:free
    fallbacks:
      - opencode/qwen3.6-plus-free # [UNVERIFIED]
    timeout_seconds: 15

  reflection:
    # Needs strong post-trade reasoning and evaluation capabilities
    primary: open_router/google/gemini-2.5-flash
    fallbacks:
      - open_router/mistral/mistral-small-latest
      - open_router/nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
      - opencode/mimo-v2.5-free # [UNVERIFIED]
    timeout_seconds: 60

  journal:
    # Journal is deterministic (no LLM)
    primary: open_router/nvidia/nemotron-3-nano-30b-a3b:free
    fallbacks:
      - opencode/qwen3.6-plus-free # [UNVERIFIED]
    timeout_seconds: 15

  memory:
    # Memory is deterministic (no LLM)
    primary: open_router/nvidia/nemotron-3-nano-30b-a3b:free
    fallbacks:
      - opencode/minimax-m3-free # [UNVERIFIED]
      - opencode/qwen3.6-plus-free # [UNVERIFIED]
    timeout_seconds: 15

  execution:
    # Execution is deterministic (no LLM)
    primary: open_router/nvidia/nemotron-3-nano-30b-a3b:free
    fallbacks:
      - opencode/qwen3.6-plus-free # [UNVERIFIED]
    timeout_seconds: 15

  vision:
    # Needs Vision (VL) capabilities for chart/image processing
    primary: open_router/nvidia/nemotron-nano-12b-v2-vl:free
    fallbacks: []
    timeout_seconds: 30

  fast:
    # Fallback for fast generic tasks
    primary: open_router/google/gemini-1.5-flash
    fallbacks:
      - open_router/mistral/mistral-small-latest
      - open_router/nvidia/nemotron-3-nano-30b-a3b:free
      - opencode/qwen3.6-plus-free # [UNVERIFIED]
    timeout_seconds: 15
